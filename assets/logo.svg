<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="720" height="210" viewBox="0 0 720 210" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- ChatMesh Logo: Chat bubble with mesh network + branding text -->

  <!-- Icon: Purple chat bubble with white mesh network inside -->
  <g transform="translate(20, 8)">
    <!-- Chat bubble body -->
    <path d="M46,10 L150,10 A18,18 0 0,1 168,28 L168,112 A18,18 0 0,1 150,130 L82,130 L48,180 L60,130 L46,130 A18,18 0 0,1 28,112 L28,28 A18,18 0 0,1 46,10 Z"
          fill="#512BD4"/>

    <!-- Mesh connections (white lines) -->
    <line x1="98" y1="40" x2="142" y2="70" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
    <line x1="98" y1="40" x2="98" y2="102" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
    <line x1="98" y1="40" x2="54" y2="70" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
    <line x1="142" y1="70" x2="98" y2="102" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
    <line x1="142" y1="70" x2="54" y2="70" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
    <line x1="98" y1="102" x2="54" y2="70" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>

    <!-- Mesh nodes (white circles) -->
    <circle cx="98" cy="40" r="9" fill="#FFFFFF"/>
    <circle cx="142" cy="70" r="9" fill="#FFFFFF"/>
    <circle cx="98" cy="102" r="9" fill="#FFFFFF"/>
    <circle cx="54" cy="70" r="9" fill="#FFFFFF"/>
  </g>

  <!-- Text: "ChatMesh" -->
  <text x="215" y="100" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="58" font-weight="700" fill="#333333">Chat<tspan fill="#512BD4">Mesh</tspan></text>

  <!-- Tagline: "Real-time messaging for .NET" -->
  <text x="217" y="135" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="#777777">Real-time messaging for .NET</text>
</svg>
