<svg xmlns="http://www.w3.org/2000/svg" viewBox="60 80 380 380" width="100%" height="100%">
    <defs>
        <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8B5CF6" /> <stop offset="100%" stop-color="#3B82F6" /> </linearGradient>

        <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#3B82F6" flood-opacity="0.3" />
        </filter>

        <mask id="meshMask">
            <rect width="500" height="500" fill="white" />
            <circle cx="210" cy="170" r="7" fill="black" />
            <circle cx="310" cy="170" r="7" fill="black" />
            <circle cx="190" cy="270" r="7" fill="black" />
            <circle cx="290" cy="270" r="7" fill="black" />
        </mask>
    </defs>

    <path d="M 120 100
             H 380
             A 40 40 0 0 1 420 140
             V 300
             A 40 40 0 0 1 380 340
             H 220
             L 150 420
             L 180 340
             H 120
             A 40 40 0 0 1 80 300
             V 140
             A 40 40 0 0 1 120 100
             Z"
          fill="url(#bubbleGrad)"
          filter="url(#shadow)" />

    <g mask="url(#meshMask)">
        <g stroke="#ffffff" stroke-width="14" stroke-linecap="round">
           <line x1="150" y1="170" x2="370" y2="170" />
           <line x1="130" y1="270" x2="350" y2="270" />
           <line x1="220" y1="120" x2="180" y2="320" />
           <line x1="320" y1="120" x2="280" y2="320" />
        </g>
        
        <g fill="#ffffff">
           <circle cx="210" cy="170" r="16" />
           <circle cx="310" cy="170" r="16" />
           <circle cx="190" cy="270" r="16" />
           <circle cx="290" cy="270" r="16" />
        </g>
        
        <g fill="#ffffff">
           <circle cx="150" cy="170" r="9" />
           <circle cx="370" cy="170" r="9" />
           <circle cx="130" cy="270" r="9" />
           <circle cx="350" cy="270" r="9" />
           <circle cx="220" cy="120" r="9" />
           <circle cx="180" cy="320" r="9" />
           <circle cx="320" cy="120" r="9" />
           <circle cx="280" cy="320" r="9" />
        </g>
    </g>

    <text x="250" y="425" font-family="system-ui, -apple-system, sans-serif" font-weight="850" font-size="70" text-anchor="middle" letter-spacing="-2">
        <tspan fill="#1E293B">Chat</tspan><tspan fill="#3B82F6">Mesh</tspan>
    </text>
</svg>
